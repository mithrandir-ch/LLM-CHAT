<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{CSS_URI}} 'unsafe-inline'; script-src {{JS_URI}} 'unsafe-inline'; connect-src http://127.0.0.1:8765;">
  <link rel="stylesheet" href="{{CSS_URI}}">
  <title>LLM-CHAT</title>
</head>
<body>
  <!-- Model Bar -->
  <div id="model-bar">
    <select id="model-select"></select>
    <span id="stats"></span>
  </div>

  <!-- Session Panel -->
  <div id="session-bar">
    <span class="section-title">Sessions</span>
    <div id="session-actions">
      <button id="btn-new-session" title="Neue Session">+</button>
      <button id="btn-del-session" title="Session löschen">✕</button>
    </div>
  </div>
  <div id="session-list"></div>

  <!-- Chat -->
  <div id="chat-container">
    <div id="messages"></div>
  </div>

  <!-- Input -->
  <div id="input-bar">
    <textarea id="input-field" rows="2" placeholder="Nachricht …"></textarea>
    <button id="btn-send">Senden</button>
  </div>

  <script src="{{JS_URI}}"></script>
</body>
</html>
